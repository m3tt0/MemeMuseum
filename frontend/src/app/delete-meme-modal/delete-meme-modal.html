<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 px-4" (click)="handleClose()">
  <div class="w-full max-w-md rounded-2xl bg-base-100 border border-base-300 shadow-2xl p-6" (click)="$event.stopPropagation()">
    <h3 class="text-xl font-bold mb-3">Delete meme</h3>
    <p class="text-base-content/80">
      Are you sure you want to delete this meme? This action cannot be undone.
    </p>
    <div class="mt-6 flex justify-end gap-3">
      <button class="btn btn-ghost" (click)="handleClose()" [disabled]="isDeleting">
        Cancel
      </button>
      <button class="btn btn-error" (click)="handleConfirm()" [disabled]="isDeleting">
        {{ isDeleting ? 'Deleting...' : 'Delete' }}
      </button>
    </div>
  </div>
</div>
