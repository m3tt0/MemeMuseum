<div class="card bg-base-100 shadow-md border border-base-300">
  <!-- header -->
  <div class="card-body pb-3">
    <div class="flex items-center gap-3">
      <div class="avatar">
        <div class="w-10 rounded-full">
            <img [ngSrc]="authorPfpUrl" fill class="object-cover" />
        </div>
      </div>

      <div class="flex-1">
        <div class="font-semibold leading-tight">{{ meme.User.userName }}</div>
        <div class="text-xs opacity-70">{{ meme.creationDate | date:'short' }}</div>
      </div>

      <button class="btn btn-ghost btn-sm">⋯</button>
    </div>
  </div>

  <!-- media -->
  <div class="px-4 pb-4">
    <!-- box ratio: 1/1 oppure 4/5 stile Instagram -->
    <div class="relative w-full overflow-hidden rounded-xl bg-base-200" style="aspect-ratio: 1 / 1;">
      <img
        [ngSrc]="memeImageUrl"
        fill
        class="object-contain"
        priority="true"
      />
    </div>
  </div>

  <!-- footer -->
  <div class="card-body pt-0">
    <div class="flex items-center gap-2">
        <button class="btn btn-ghost btn-sm">
            ❤️ <span class="ml-1">{{ meme.upvotes }}</span>
        </button>
        <button class="btn btn-ghost btn-sm">
            ❤️ <span class="ml-1">{{ meme.downvotes }}</span>
        </button>
        <button class="btn btn-ghost btn-sm">
            💬 <span class="ml-1">{{ meme.commentsCount }}</span>
        </button>
      <div class="flex-1"></div>
      <button class="btn btn-ghost btn-sm">🔖</button>
    </div>

    @if (meme.Tags?.length) {
      <div class="flex flex-wrap gap-2 pt-2">
        @for (t of meme.Tags; track t) {
          <span class="badge badge-outline">#{{ t }}</span>
        }
      </div>
    }
  </div>
</div>
